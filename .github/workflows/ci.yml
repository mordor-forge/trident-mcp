name: CI
on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Unit tests
        run: go test ./... -count=1 -v
      - name: Vet
        run: go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
      - name: Security scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Require E2E credentials
        env:
          TRIPO_API_KEY: ${{ secrets.TRIPO_API_KEY }}
        run: |
          if [ -z "$TRIPO_API_KEY" ]; then
            echo "TRIPO_API_KEY secret is required for the e2e job" >&2
            exit 1
          fi
      - name: E2E tests
        env:
          TRIPO_API_KEY: ${{ secrets.TRIPO_API_KEY }}
        run: go test -tags=e2e -run "TestE2E_" ./internal/provider/tripo/ -count=1 -v -timeout 10m

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 20
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
